<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking de Campeões - 2XAcademy</title>
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* --- ESTILO EXCLUSIVO DA TIER LIST --- */
        .tierlist-container { 
            width: 100%; 
            max-width: 900px; 
            margin-top: 20px;
        }

        .tier-row { 
            display: flex; 
            margin-bottom: 15px; 
            background-color: #353b48; 
            border-radius: 8px; 
            overflow: hidden; 
            min-height: 110px;
        }

        .tier-label { 
            flex-shrink: 0; 
            width: 90px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-family: 'Russo One', sans-serif; 
            font-size: 3em; 
            font-weight: bold; 
            color: white; 
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.4);
        }

        /* Cores dos Rankings */
        .tier-s .tier-label { background-color: #e84118; }
        .tier-a .tier-label { background-color: #0097e6; }
        .tier-b .tier-label { background-color: #fbc531; }
        .tier-c .tier-label { background-color: #4cd137; }
        .tier-d .tier-label { background-color: #8c8c8c; }

        .champion-portraits { 
            display: flex; 
            flex-wrap: wrap; 
            padding: 15px; 
            gap: 15px; 
            align-items: center;
        }

        /* TRAVA DE TAMANHO DAS FOTOS */
        .champion-card { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: 80px; 
        }

        .champion-card img { 
            width: 80px; 
            height: 80px; 
            border: 2px solid white; 
            border-radius: 8px; 
            object-fit: cover;
            background-color: #1a202c;
        }

        .champion-name {
            font-size: 0.75em;
            margin-top: 5px;
            color: #e2e8f0;
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <header>
        <h1>2XAcademy</h1>
        <nav class="navegacao">
            <a href="index.html" class="nav-botao">Início</a>
            <a href="champions.html" class="nav-botao">Campeões</a>
            <a href="teams.html" class="nav-botao">Melhores Duplas</a>
            <a href="fuses.html" class="nav-botao">Fuses</a>
        </nav>
    </header>

    <main>
        <h2>Tier List de Campeões</h2>
        
        <div class="tierlist-container">
            
            <div class="tier-row tier-s">
                <div class="tier-label">S</div>
                <div class="champion-portraits">
                    <div class="champion-card"><img src="champs/vi.avif"><div class="champion-name">Vi</div></div>
                    <div class="champion-card"><img src="champs/caitlyn.avif"><div class="champion-name">Caitlyn</div></div>
                    <div class="champion-card"><img src="champs/yasuo.avif"><div class="champion-name">Yasuo</div></div>
                    <div class="champion-card"><img src="champs/jinx.avif"><div class="champion-name">Jinx</div></div>
                </div>
            </div>

            <div class="tier-row tier-a">
                <div class="tier-label">A</div>
                <div class="champion-portraits">
                    <div class="champion-card"><img src="champs/illaoi.avif"><div class="champion-name">Illaoi</div></div>
                    <div class="champion-card"><img src="champs/ekko.avif"><div class="champion-name">Ekko</div></div>
                    <div class="champion-card"><img src="champs/teemo.avif"><div class="champion-name">Teemo</div></div>
                </div>
            </div>

            <div class="tier-row tier-b">
                <div class="tier-label">B</div>
                <div class="champion-portraits">
                    <div class="champion-card"><img src="champs/braum.avif"><div class="champion-name">Braum</div></div>
                    <div class="champion-card"><img src="champs/blitzcrank.avif"><div class="champion-name">Blitz</div></div>
                </div>
            </div>

            <div class="tier-row tier-c">
                <div class="tier-label">C</div>
                <div class="champion-portraits">
                    <div class="champion-card"><img src="champs/ahri.avif"><div class="champion-name">Ahri</div></div>
                </div>
            </div>

            <div class="tier-row tier-d">
                <div class="tier-label">D</div>
                <div class="champion-portraits">
                    </div>
            </div>

        </div>
    </main>

</body>
</html>
